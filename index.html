<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Inventario VS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 70px; }
        .card-producto { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .btn-plus { font-size: 1.5rem; width: 50px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-3">
    <div class="container-fluid">
        <span class="navbar-brand">🌸 Inventario de Mamá</span>
    </div>
</nav>

<div class="container">
    <div class="card p-3 mb-4 card-producto">
        <h5>Registrar Nuevo</h5>
        <input type="text" id="txtCodigo" class="form-control mb-2" placeholder="Código de Barras">
        <input type="text" id="txtNombre" class="form-control mb-2" placeholder="Nombre (ej: Love Spell)">
        <input type="number" id="txtStock" class="form-control mb-2" placeholder="Cantidad Inicial" value="1">
        <button class="btn btn-primary w-100" onclick="app.guardar()">Guardar Producto</button>
    </div>

    <h5>Mi Stock</h5>
    <div id="listaProductos">
        </div>
</div>

<script src="js/db.js"></script>
<script>
    // Registrar el Service Worker para modo Offline
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
