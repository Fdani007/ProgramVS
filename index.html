<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <title>Inventario Mamá</title>
</head>
<body class="bg-light">

<div class="container py-3">
    <h4 class="text-center mb-4">🌸 Stock Victoria's Secret</h4>
    
    <div id="reader" style="width: 100%; display: none;" class="mb-3"></div>
    <button class="btn btn-dark w-100 mb-3" onclick="document.getElementById('reader').style.display='block'; iniciarEscaner(c => document.getElementById('txtCodigo').value = c)">
        📷 Escanear Código
    </button>

    <div class="card p-3 mb-4 shadow-sm">
        <input type="text" id="txtCodigo" class="form-control mb-2" placeholder="Código de Barras">
        <input type="text" id="txtNombre" class="form-control mb-2" placeholder="Nombre de Fragancia">
        <input type="number" id="txtStock" class="form-control mb-2" placeholder="Cantidad" value="1">
        <button class="btn btn-success w-100" onclick="ui.registrar()">Guardar en Inventario</button>
    </div>

    <div id="listaProductos"></div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="js/db.js"></script>
<script src="js/scanner.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
