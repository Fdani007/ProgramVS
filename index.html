<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario VS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-3">
    <div class="container-fluid">
        <span class="navbar-brand">🌸 Inventario Mamá</span>
    </div>
</nav>

<div class="container">
    <div class="card p-3 mb-4 shadow-sm">
        <h5>Registrar Producto</h5>
        <input type="text" id="txtCodigo" class="form-control mb-2" placeholder="Código de Barras">
        <input type="text" id="txtNombre" class="form-control mb-2" placeholder="Nombre (ej: Love Spell)">
        <input type="number" id="txtStock" class="form-control mb-2" placeholder="Cantidad" value="1">
        <button class="btn btn-success w-100" onclick="app.guardar()">Guardar en Teléfono</button>
    </div>

    <h5>Mi Stock Actual</h5>
    <div id="listaProductos" class="list-group">
        </div>
</div>

<script src="db.js"></script>
</body>
</html>
