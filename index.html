<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Inventario Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .fab-scanner { position: fixed; bottom: 20px; right: 20px; width: 70px; height: 70px; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000; }
    </style>
</head>
<body class="bg-light pb-5">

<div class="container py-3">
    <h5 class="text-center mb-4">💎 GESTIÓN DE INVENTARIO</h5>

    <div id="reader" style="display:none;" class="mb-2"></div>
    <button id="btnStop" class="btn btn-danger w-100 mb-3" style="display:none;" onclick="location.reload()">🛑 Cerrar Cámara</button>

    <div class="card p-3 shadow-sm mb-4">
        <label class="small text-muted">Código</label>
        <input type="text" id="txtCodigo" class="form-control mb-2" onchange="ui.verificarExistencia(this.value)">
        
        <label class="small text-muted">Nombre del Producto</label>
        <input type="text" id="txtNombre" class="form-control mb-2">
        
        <div class="row">
            <div class="col-6">
                <label class="small text-muted">Marca</label>
                <select id="selMarca" class="form-select mb-2"></select>
            </div>
            <div class="col-6">
                <label class="small text-muted">Tipo</label>
                <select id="selCategoria" class="form-select mb-2"></select>
            </div>
        </div>

        <label class="small text-muted">Stock Inicial</label>
        <input type="number" id="txtStock" class="form-control mb-2" value="1">

        <label class="small text-muted">Foto (Opcional)</label>
        <input type="file" id="imgProducto" class="form-control mb-3" accept="image/*" capture="environment">

        <button class="btn btn-success w-100 py-2" onclick="ui.guardarProducto()">💾 GUARDAR PRODUCTO</button>
    </div>

    <h6 class="mb-3">LISTADO DISPONIBLE</h6>
    <div id="listaProductos"></div>
</div>

<button class="btn btn-primary fab-scanner" onclick="iniciarEscaner()">📷</button>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="js/db.js"></script>
<script src="js/scanner.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
